<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palace  😈</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:radial-gradient(circle at top, #15162c, #09090f);
  color:#fff;
  font-family:'Poppins',sans-serif;
}

.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:520px;
  background:linear-gradient(180deg,#111326,#0c0d1f);
  padding:32px 24px;
  border-radius:20px;
  box-shadow:0 0 35px rgba(88,101,242,.55);
  text-align:center;
}

.badge{
  display:inline-block;
  background:#5865F2;
  color:white;
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  margin-bottom:16px;
}

h1{
  font-size:34px;
  font-weight:800;
  line-height:1.1;
  margin:10px 0;
}

.highlight{
  color:#5865F2;
}

.desc{
  margin-top:14px;
  font-size:16px;
  color:#d0d0d0;
  line-height:1.5;
}

.features{
  margin:22px 0;
  text-align:left;
  font-size:15px;
}

.features div{
  margin:10px 0;
}

.btn{
  margin-top:28px;
  display:block;
  width:100%;
  background:#5865F2;
  padding:18px;
  border-radius:14px;
  color:white;
  font-size:20px;
  font-weight:700;
  text-decoration:none;
  transition:.25s;
}

.btn:hover{
  background:#4755d8;
  transform:scale(1.03);
}

.footer{
  margin-top:22px;
  font-size:13px;
  color:#aaa;
}

.{
  margin-top:10px;
  font-size:14px;
  color:#8ea1e1;
}

/* MOBILE */
@media(max-width:480px){
  h1{font-size:30px;}
  .desc{font-size:15px;}
  .btn{font-size:18px;}
}
</style>

<body>

<div class="container">
  <div class="card">

    <div class="badge">🔥  Privado</div>

    <h1>
      El Drive con <span class="highlight">mas contenido de Argentina</span> 😈
    </h1>

    <p class="desc">
      Contenido exclusivo, comunidad activa 24/7  
      y cosas que <b>no van en Instagram</b>.
    </p>

    <div class="features">
      <div>💬 Chats activos todo el día</div>
      <div>🎁 Sorteos y drops exclusivos</div>
      <div>🔞 Contenido exclusivo</div>
      <div>🚪 Acceso limitado</div>
    </div>

    <a href="https://fotrot.github.io/impala/"
       class="btn"
       onclick="fbq('track','Lead');">
      👉 ENTRAR 
    </a>

    <div class="">
      Vas directo a  • Un clic • Sin vueltas
    </div>

      Comunidad privada
    </div>

  </div>
